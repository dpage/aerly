<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="color-scheme" content="light dark" />
    <!-- PWA: theme tint for the browser/OS chrome, and the iOS-specific hints
         that let Aerly run full-screen when added to the home screen (iOS reads
         these, not the web manifest, for standalone display and titling). The
         web app manifest itself is injected by vite-plugin-pwa at build time. -->
    <meta name="theme-color" content="#0d1117" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Aerly" />
    <!-- A single brand mark designed to read against both light and dark UI,
         so no theme-aware variants are needed. favicon.ico is the legacy
         fallback for clients that ignore the PNG link. -->
    <link rel="icon" href="/favicon.ico" sizes="any" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <title>Aerly</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
