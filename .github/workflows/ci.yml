name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  # The Go and web suites are independent, so run them as separate jobs in
  # parallel: the overall CI wall-clock is then max(go, web) rather than their
  # sum. Only the Go job needs Postgres; only the web job needs Node.
  go:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: aerly
          POSTGRES_PASSWORD: aerly
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U aerly"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      # testsupport connects here to CREATE/DROP an isolated DB per test.
      TEST_DATABASE_URL: postgres://aerly:aerly@127.0.0.1:5432/postgres?sslmode=disable
      # Fail (don't skip) DB-backed tests if Postgres is unreachable.
      AERLY_REQUIRE_DB: "1"

    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          check-latest: true

      - name: go vet
        run: go vet ./cmd/... ./internal/... ./migrations ./web

      - name: Go tests (per-file 90% coverage gate)
        run: |
          go test -covermode=set -coverprofile=coverage.out ./cmd/... ./internal/... ./migrations ./web
          go run ./cmd/coverage-gate -profile=coverage.out -min=90 -enforce

  web:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: web

    steps:
      - uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install web dependencies
        run: npm ci

      - name: Web typecheck
        run: npm run typecheck

      - name: Web lint
        run: npm run lint

      - name: Web tests (per-file 90% coverage gate)
        run: npm run test:coverage
